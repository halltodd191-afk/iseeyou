name: Iseeyou
options:
  bundleIdPrefix: com.yourdomain
targets:
  Iseeyou:
    type: application
    platform: iOS
    deploymentTarget: "14.0"
    dependencies:
      - sdk: Contacts.framework
      - sdk: AVFoundation.framework
      - sdk: Security.framework
      - sdk: CoreLocation.framework
      - sdk: UserNotifications.framework
    sources:
      - path: .
        excludes:
          - "backend"
          - ".github"
          - "dashboard"
          - "build"
          - "*.zip"
          - "*.ipa"
          - "AltServer*"
          - "project.yml"
          - "export.plist"
          - "build_and_sign.py"
          - "gen_png.py"
    info:
      path: Info.plist
      properties:
        UILaunchStoryboardName: LaunchScreen
